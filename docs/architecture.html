<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DoG - Architecture</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<main>
  <header>
    <small>Architecture and C4-style overview</small>
    <h1>Application architecture</h1>
    <p>The project uses a simple browser to PHP to SQLite flow. The interface runs in the browser, sends asynchronous requests with Fetch API, and the PHP backend validates JWT tokens, processes documents and stores data in SQLite.</p>
  </header>

  <figure>
    <div class="diagram">
      <div class="diagram-flow">
        <div class="diagram-box"><strong>User browser</strong><br>HTML + CSS + vanilla JavaScript<br>DOM events, Fetch API, admin panel, localStorage JWT token</div>
        <div class="diagram-box"><strong>PHP application layer</strong><br><code>index.php</code>, <code>api.php</code>, JWT auth, request routing, export endpoints</div>
        <div class="grid-two">
        <div class="diagram-box"><strong>Helper logic</strong><br>database access, template rendering, random demo data, PDF builder, audit logging</div>
          <div class="diagram-box"><strong>Persistence</strong><br>SQLite tables: users, templates, documents, import jobs and audit log</div>
        </div>
        <div class="diagram-box"><strong>Outputs</strong><br>HTML preview, JSON export, PDF export, CSV import processing, project documentation</div>
      </div>
    </div>
    <figcaption>Figure 1. High-level architecture of the DoG web application.</figcaption>
  </figure>
</main>
</body>
</html>
